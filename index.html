<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>AkaTsuki Organization — Boutique</title>

  <style>
    :root{
      --gold:#ffd46b;
      --orange:#ff6a00;
      --red:#b40000;
      --panel:rgba(24,5,5,.78);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *{box-sizing:border-box;}

    html{
      width:100%;
      min-height:100%;
      margin:0;
      padding:0;
      -webkit-text-size-adjust:100%;
      scroll-behavior:smooth;
    }

    body{
      width:100%;
      min-width:0;
      min-height:100dvh;
      margin:0;
      padding:0;
      font-family:Georgia,'Times New Roman',serif;
      color:#fff;
      background:radial-gradient(circle at 50% 0%,#451100 0,#120303 42%,#020000 100%);
      overflow-x:hidden;
    }

    body:before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 50% 30%,rgba(255,105,0,.35),transparent 35%),
        linear-gradient(120deg,transparent,rgba(255,0,0,.14),transparent);
      pointer-events:none;
      z-index:0;
    }

    img,svg,video,canvas{
      max-width:100%;
      height:auto;
    }

    button,select,input,textarea{
      font:inherit;
      max-width:100%;
    }

    .wrap{
      position:relative;
      z-index:1;
      width:min(100%,1180px);
      margin:0 auto;
      padding:clamp(10px,2.4vw,22px) clamp(10px,2.6vw,22px) calc(110px + var(--safe-bottom));
    }

    .hero{width:100%;}

    .intro{
      text-align:center;
      max-width:760px;
      margin:0 auto clamp(20px,4vw,34px);
      padding-top:4px;
    }

    .badge{
      display:inline-block;
      border:1px solid rgba(255,212,107,.5);
      padding:8px 14px;
      border-radius:999px;
      color:var(--gold);
      background:rgba(0,0,0,.35);
      letter-spacing:.08em;
      text-transform:uppercase;
      font:700 clamp(11px,2.7vw,13px)/1 Arial,sans-serif;
    }

    .title{
      font-size:clamp(34px,10vw,86px);
      line-height:.92;
      margin:clamp(14px,3vw,18px) 0 14px;
      text-transform:uppercase;
      text-shadow:0 0 18px rgba(255,95,0,.9);
      overflow-wrap:anywhere;
    }

    .subtitle{
      font-family:Arial,sans-serif;
      font-size:clamp(14px,3.6vw,18px);
      line-height:1.55;
      color:#ffe9c0;
      max-width:650px;
      margin:0 auto;
    }

    .shop{
      display:grid;
      grid-template-columns:minmax(0,1fr);
      gap:clamp(18px,4vw,28px);
      width:100%;
      max-width:720px;
      margin:0 auto;
    }

    .product-card{
      width:100%;
      min-width:0;
      border:1px solid rgba(255,212,107,.45);
      background:var(--panel);
      border-radius:clamp(20px,5vw,28px);
      padding:clamp(14px,3.8vw,24px);
      box-shadow:
        0 0 40px rgba(255,70,0,.35),
        inset 0 0 30px rgba(255,125,0,.08);
      backdrop-filter:blur(8px);
    }

    .product-head{
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:flex-start;
      margin-bottom:16px;
    }

    .product-head h2{
      font-size:clamp(22px,5.8vw,28px);
      line-height:1.08;
      margin:0 0 8px;
      overflow-wrap:anywhere;
    }

    .tag{
      font-family:Arial,sans-serif;
      color:#120000;
      background:linear-gradient(135deg,#ffe39a,#ff7400);
      font-weight:900;
      padding:8px 12px;
      border-radius:999px;
      white-space:nowrap;
      font-size:12px;
      text-transform:uppercase;
      box-shadow:0 0 18px rgba(255,120,0,.45);
    }

    .gallery{
      position:relative;
      overflow:hidden;
      border-radius:clamp(18px,4vw,24px);
      background:rgba(0,0,0,.38);
      border:1px solid rgba(255,212,107,.22);
      width:100%;
    }

    .slides{
      display:flex;
      width:100%;
      transition:transform .35s ease;
      touch-action:pan-y;
      will-change:transform;
    }

    .slide{
      flex:0 0 100%;
      width:100%;
      min-width:100%;
      height:clamp(230px,58vw,380px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:clamp(12px,4vw,22px);
    }

    .slide img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 0 24px rgba(255,95,0,.6));
    }

    .nav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:clamp(36px,9vw,42px);
      height:clamp(36px,9vw,42px);
      border-radius:50%;
      border:1px solid var(--gold);
      background:rgba(10,0,0,.82);
      color:var(--gold);
      font-size:clamp(22px,6vw,26px);
      line-height:1;
      cursor:pointer;
      z-index:2;
      display:grid;
      place-items:center;
    }

    .prev{left:10px;}
    .next{right:10px;}

    .dots{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:center;
      margin:14px 0;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      border:1px solid var(--gold);
      background:transparent;
      cursor:pointer;
      padding:0;
    }

    .dot.active{
      background:var(--gold);
      box-shadow:0 0 12px rgba(255,212,107,.8);
    }

    .small{
      font-family:Arial,sans-serif;
      color:#ffd9a3;
      line-height:1.5;
      margin:0;
    }

    .price{
      font-size:clamp(32px,8vw,42px);
      color:var(--gold);
      font-weight:bold;
      margin:12px 0;
    }

    .controls{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(0,1fr) auto;
      gap:14px;
      align-items:end;
      margin:20px 0;
      width:100%;
    }

    .field{min-width:0;}

    .field label{
      display:block;
      font-family:Arial,sans-serif;
      font-size:13px;
      color:#ffd9a3;
      margin-bottom:8px;
    }

    select{
      width:100%;
      min-height:46px;
      padding:12px 13px;
      border-radius:14px;
      border:1px solid rgba(255,212,107,.5);
      background:#160202;
      color:#fff;
      font-weight:bold;
    }

    .qty{
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:flex-end;
      min-width:116px;
    }

    .qty button{
      flex:0 0 auto;
      width:42px;
      height:42px;
      border-radius:50%;
      border:1px solid var(--gold);
      background:#180202;
      color:var(--gold);
      font-size:22px;
      line-height:1;
      cursor:pointer;
    }

    .qty span{
      font-size:22px;
      min-width:25px;
      text-align:center;
    }

    .buy{
      width:100%;
      border:0;
      border-radius:18px;
      padding:clamp(15px,4vw,18px) 18px;
      background:linear-gradient(135deg,#ffe39a,#ff7400,#a80000);
      color:#120000;
      font-weight:900;
      text-transform:uppercase;
      font-size:clamp(15px,4vw,18px);
      letter-spacing:.08em;
      cursor:pointer;
      box-shadow:0 0 28px rgba(255,95,0,.55);
    }

    .buy:disabled{opacity:.6; cursor:wait;}

    .extra{
      margin:14px 0 0;
      font-family:Arial,sans-serif;
      font-size:13px;
      color:#ffe9c0;
      opacity:.88;
    }

    #cartToggle{
      position:fixed;
      right:max(12px, env(safe-area-inset-right, 0px));
      bottom:calc(12px + var(--safe-bottom));
      z-index:50;
      border:none;
      border-radius:999px;
      padding:14px 20px;
      background:linear-gradient(135deg,#ffe39a,#ff7400,#a80000);
      color:#120000;
      font-weight:900;
      font-size:clamp(16px,4.5vw,18px);
      box-shadow:0 0 28px rgba(255,95,0,.7);
      cursor:pointer;
    }

    #cartPanel{
      position:fixed;
      right:max(12px, env(safe-area-inset-right, 0px));
      bottom:calc(76px + var(--safe-bottom));
      z-index:49;
      width:min(calc(100vw - 24px),390px);
      max-height:min(70dvh,560px);
      overflow:auto;
      overscroll-behavior:contain;
      background:rgba(15,0,0,.96);
      border:1px solid rgba(255,212,107,.45);
      border-radius:24px;
      padding:18px;
      box-shadow:0 0 40px rgba(255,70,0,.45);
      display:none;
    }

    #cartPanel.open{display:block;}

    #cartPanel h2{margin-top:0; color:var(--gold);}

    .cart-item{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:12px 0;
      border-bottom:1px solid rgba(255,212,107,.2);
      font-family:Arial,sans-serif;
    }

    .cart-item small{color:#ffd9a3;}

    .cart-item button{
      margin-left:8px;
      border:none;
      background:#ff4b00;
      color:white;
      border-radius:8px;
      cursor:pointer;
    }

    #cartTotal{margin:18px 0; font-size:20px; color:var(--gold);}

    #checkoutBtn{
      width:100%;
      border:0;
      border-radius:18px;
      padding:16px;
      background:linear-gradient(135deg,#ffe39a,#ff7400,#a80000);
      color:#120000;
      font-weight:900;
      text-transform:uppercase;
      cursor:pointer;
    }

    @media(max-width:760px){
      .product-head{flex-direction:column; gap:10px;}
      .tag{white-space:normal; text-align:center;}
      .controls{grid-template-columns:1fr;}
      .qty{justify-content:flex-start; min-width:0;}
      .cart-item{align-items:flex-start;}
    }

    @media(max-width:420px){
      .wrap{padding-left:8px; padding-right:8px;}
      .product-card{padding:13px;}
      .slide{height:clamp(210px,68vw,290px);}
      .nav{opacity:.92;}
      #cartPanel{left:8px; right:8px; width:auto;}
    }

    @media(min-width:900px){
      .shop{max-width:760px;}
    }
  </style>
</head>

let cart = JSON.parse(localStorage.getItem("aka_cart") || "[]");

const shop = document.querySelector("#shop");

function saveCart(){
  localStorage.setItem("aka_cart", JSON.stringify(cart));
  renderCart();
}

function formatPrice(cents){
  return (cents / 100).toFixed(2).replace(".", ",") + " €";
}

function addToCart(item){
  const existing = cart.find(x => x.syncVariantId === item.syncVariantId);

  if(existing){
    existing.quantity += item.quantity;
  } else {
    cart.push(item);
  }

  saveCart();
}

function removeFromCart(index){
  cart.splice(index, 1);
  saveCart();
}

function renderCart(){
  let cartBox = document.querySelector("#cartBox");

  if(!cartBox){
    cartBox = document.createElement("div");
    cartBox.id = "cartBox";
    cartBox.innerHTML = `
      <button id="cartToggle">🛒 <span id="cartCount">0</span></button>
      <div id="cartPanel">
        <h2>Mon panier</h2>
        <div id="cartItems"></div>
        <div id="cartTotal"></div>
        <button id="checkoutBtn">Commander le panier</button>
      </div>
    `;

    document.body.appendChild(cartBox);

    document.querySelector("#cartToggle").onclick = () => {
      document.querySelector("#cartPanel").classList.toggle("open");
    };

    document.querySelector("#checkoutBtn").onclick = checkoutCart;
  }

  const cartItems = document.querySelector("#cartItems");
  const cartCount = document.querySelector("#cartCount");
  const cartTotal = document.querySelector("#cartTotal");

  cartItems.innerHTML = "";

  let totalQty = 0;
  let totalPrice = 0;

  cart.forEach((item, index) => {
    totalQty += item.quantity;
    totalPrice += item.priceCents * item.quantity;

    const row = document.createElement("div");
    row.className = "cart-item";
    row.innerHTML = `
      <div>
        <strong>${item.name}</strong><br>
        <small>${item.color} / ${item.size} × ${item.quantity}</small>
      </div>
      <div>
        ${formatPrice(item.priceCents * item.quantity)}
        <button onclick="removeFromCart(${index})">×</button>
      </div>
    `;

    cartItems.appendChild(row);
  });

  cartCount.textContent = totalQty;
  cartTotal.innerHTML = `<strong>Total : ${formatPrice(totalPrice)}</strong>`;
}

async function checkoutCart(){
  if(cart.length === 0){
    alert("Ton panier est vide.");
    return;
  }

  const btn = document.querySelector("#checkoutBtn");
  btn.disabled = true;
  btn.textContent = "Ouverture du paiement...";

  try{
    const res = await fetch(`${BACKEND_URL}/create-checkout-session`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        cart: cart.map(item => ({
          productKey: item.productKey,
          syncVariantId: item.syncVariantId,
          quantity: item.quantity
        }))
      })
    });

    const data = await res.json();

    if(!data.url){
      throw new Error(data.error || "Erreur paiement");
    }

    localStorage.removeItem("aka_cart");
    window.top.location.href = data.url;

  } catch(err){
    alert("Erreur : " + err.message);
    btn.disabled = false;
    btn.textContent = "Commander le panier";
  }
}

PRODUCTS.forEach(product => {
  const colorNames = Object.keys(product.colors);
  const defaultColor = colorNames[0];

  const card = document.createElement("article");
  card.className = "product-card";

  card.innerHTML = `
    <div class="product-head">
      <div>
        <h2>${product.name}</h2>

      <div class="slides"></div>
      <button class="nav next" type="button">›</button>
    </div>

    <div class="dots"></div>

    <div class="price">${product.priceText}</div>

    <div class="controls">
      <div class="field">
        <label>Couleur</label>
        <select class="color-select">

      </div>

      <div class="field">
        <label>Taille / Format</label>
        <select class="variant-select"></select>
      </div>

      <div class="qty">
        <button class="minus" type="button">−</button>
        <span class="qty-value">1</span>
        <button class="plus" type="button">+</button>
      </div>
    </div>

    <button class="buy" type="button">Ajouter au panier</button>
    <p class="extra">Livraison comprise · Paiement sécurisé Stripe.</p>
  `;

  shop.appendChild(card);

  const colorSelect = card.querySelector(".color-select");
  const variantSelect = card.querySelector(".variant-select");
  const slides = card.querySelector(".slides");
  const dots = card.querySelector(".dots");
  const qtyValue = card.querySelector(".qty-value");

  let quantity = 1;
  let currentSlide = 0;

  function updateGallery(){
    slides.style.transform = `translateX(-${currentSlide * 100}%)`;

    dots.querySelectorAll(".dot").forEach((dot, index) => {
      dot.classList.toggle("active", index === currentSlide);
    });
  }

  function renderGallery(){
    const color = colorSelect.value;
    const colorData = product.colors[color];

    currentSlide = 0;

    slides.innerHTML = colorData.images.map(image => `
      <div class="slide">
        <img src="${image}" alt="${product.name}">
      </div>
    `).join("");

    dots.innerHTML = colorData.images.map((_, index) => `
      <button class="dot ${index === 0 ? "active" : ""}" type="button"></button>
    `).join("");

    updateGallery();
    sendIframeHeight();
  }

  function refreshVariants(){
    const color = colorSelect.value;
    const colorData = product.colors[color];

    variantSelect.innerHTML = Object.keys(colorData.variants)
      .map(size => `<option value="${colorData.variants[size]}">${size}</option>`)
      .join("");

    renderGallery();
  }

  colorSelect.onchange = refreshVariants;
  refreshVariants();

  card.querySelector(".prev").onclick = () => {
    const colorData = product.colors[colorSelect.value];
    currentSlide = (currentSlide - 1 + colorData.images.length) % colorData.images.length;
    updateGallery();
  };

  card.querySelector(".next").onclick = () => {
    const colorData = product.colors[colorSelect.value];
    currentSlide = (currentSlide + 1) % colorData.images.length;
    updateGallery();
  };

  dots.onclick = (e) => {
    if(!e.target.classList.contains("dot")) return;
    currentSlide = [...dots.children].indexOf(e.target);
    updateGallery();
  };

  card.querySelector(".minus").onclick = () => {
    quantity = Math.max(1, quantity - 1);
    qtyValue.textContent = quantity;
  };

  card.querySelector(".plus").onclick = () => {
    quantity = Math.min(10, quantity + 1);
    qtyValue.textContent = quantity;
  };

  card.querySelector(".buy").onclick = () => {
    const color = colorSelect.value;
    const size = variantSelect.options[variantSelect.selectedIndex].text;
    const syncVariantId = Number(variantSelect.value);

    addToCart({
      productKey: product.key,
      name: product.name,
      color,
      size,
      syncVariantId,
      quantity,
      priceCents: product.priceCents
    });

    card.querySelector(".extra").textContent = "✅ Ajouté au panier";
  };
});

function getPageHeight(){
  const body = document.body;
  const html = document.documentElement;

  return Math.ceil(Math.max(
    body.scrollHeight,
    body.offsetHeight,
    html.clientHeight,
    html.scrollHeight,
    html.offsetHeight
  ) + 30);
}

let heightTimer;
function sendIframeHeight(){
  clearTimeout(heightTimer);
  heightTimer = setTimeout(() => {
    window.parent.postMessage({
      type:"AKATSUKI_IFRAME_HEIGHT",
      height:getPageHeight()
    }, "*");
  }, 80);
}

window.addEventListener("load", sendIframeHeight);
window.addEventListener("resize", sendIframeHeight);
window.addEventListener("orientationchange", sendIframeHeight);

document.querySelectorAll("img").forEach(img => {
  img.addEventListener("load", sendIframeHeight);
  img.addEventListener("error", sendIframeHeight);
});

new ResizeObserver(sendIframeHeight).observe(document.body);
new MutationObserver(sendIframeHeight).observe(document.body, {
  childList:true,
  subtree:true,
  attributes:true
});

renderCart();
sendIframeHeight();
</script>

</body>
</html>
