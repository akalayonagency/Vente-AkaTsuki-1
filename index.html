<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>AkaTsuki Organization — Boutique</title>

  <style>
    :root{
      --gold:#ffd46b;
      --orange:#ff6a00;
      --red:#b40000;
      --panel:rgba(24,5,5,.78);
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Georgia,'Times New Roman',serif;
      color:#fff;
      background:
      radial-gradient(circle at 50% 10%,#451100 0,#120303 42%,#020000 100%);
      min-height:100vh;
      overflow-x:hidden;
    }

    body:before{
      content:"";
      position:fixed;
      inset:0;
      background:
      radial-gradient(circle at 50% 50%,rgba(255,105,0,.35),transparent 35%),
      linear-gradient(120deg,transparent,rgba(255,0,0,.14),transparent);
      pointer-events:none;
    }

    .wrap{
      position:relative;
      max-width:1180px;
      margin:0 auto;
      padding:34px 18px 70px;
    }

    .hero{
      display:grid;
      grid-template-columns:1fr 1.05fr;
      gap:38px;
      align-items:center;
      min-height:88vh;
    }

    .badge{
      display:inline-block;
      border:1px solid rgba(255,212,107,.5);
      padding:8px 14px;
      border-radius:999px;
      color:var(--gold);
      background:rgba(0,0,0,.35);
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:13px;
    }

    .title{
      font-size:clamp(42px,7vw,82px);
      line-height:.95;
      margin:22px 0 16px;
      text-transform:uppercase;
      text-shadow:0 0 18px rgba(255,95,0,.9);
    }

    .subtitle{
      font-family:Arial,sans-serif;
      font-size:18px;
      line-height:1.65;
      color:#ffe9c0;
      max-width:590px;
    }

    .shop{
      display:grid;
      gap:22px;
    }

    .product-card{
      border:1px solid rgba(255,212,107,.45);
      background:var(--panel);
      border-radius:28px;
      padding:24px;
      box-shadow:
      0 0 40px rgba(255,70,0,.35),
      inset 0 0 30px rgba(255,125,0,.08);
      backdrop-filter:blur(8px);
    }

    .product-head{
      display:flex;
      justify-content:space-between;
      gap:18px;
      align-items:flex-start;
      margin-bottom:16px;
    }

    .product-head h2{
      font-size:28px;
      margin:0 0 8px;
    }

    .tag{
      font-family:Arial,sans-serif;
      color:#120000;
      background:linear-gradient(135deg,#ffe39a,#ff7400);
      font-weight:900;
      padding:8px 12px;
      border-radius:999px;
      white-space:nowrap;
      font-size:12px;
      text-transform:uppercase;
    }

    .gallery{
      position:relative;
      overflow:hidden;
      border-radius:24px;
      background:rgba(0,0,0,.38);
      border:1px solid rgba(255,212,107,.22);
    }

    .slides{
      display:flex;
      transition:transform .35s ease;
      touch-action:pan-y;
    }

    .slide{
      min-width:100%;
      height:360px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
    }

    .slide img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      filter:drop-shadow(0 0 24px rgba(255,95,0,.6));
    }

    .nav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:42px;
      height:42px;
      border-radius:50%;
      border:1px solid var(--gold);
      background:rgba(10,0,0,.8);
      color:var(--gold);
      font-size:26px;
      cursor:pointer;
      z-index:2;
    }

    .prev{
      left:12px;
    }

    .next{
      right:12px;
    }

    .dots{
      display:flex;
      gap:8px;
      justify-content:center;
      margin:14px 0;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      border:1px solid var(--gold);
      background:transparent;
      cursor:pointer;
    }

    .dot.active{
      background:var(--gold);
      box-shadow:0 0 12px rgba(255,212,107,.8);
    }

    .small{
      font-family:Arial,sans-serif;
      color:#ffd9a3;
      line-height:1.5;
    }

    .price{
      font-size:42px;
      color:var(--gold);
      font-weight:bold;
      margin:12px 0;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr 120px;
      gap:14px;
      align-items:end;
      margin:20px 0;
    }

    .field label{
      display:block;
      font-family:Arial,sans-serif;
      font-size:13px;
      color:#ffd9a3;
      margin-bottom:8px;
    }

    select{
      width:100%;
      padding:13px;
      border-radius:14px;
      border:1px solid rgba(255,212,107,.5);
      background:#160202;
      color:#fff;
      font-weight:bold;
    }

    .qty{
      display:flex;
      align-items:center;
      gap:12px;
      justify-content:flex-end;
    }

    .qty button{
      width:42px;
      height:42px;
      border-radius:50%;
      border:1px solid var(--gold);
      background:#180202;
      color:var(--gold);
      font-size:22px;
      cursor:pointer;
    }

    .qty span{
      font-size:22px;
      min-width:25px;
      text-align:center;
    }

    .buy{
      width:100%;
      border:0;
      border-radius:18px;
      padding:18px 20px;
      background:
      linear-gradient(135deg,#ffe39a,#ff7400,#a80000);
      color:#120000;
      font-weight:900;
      text-transform:uppercase;
      font-size:18px;
      letter-spacing:.08em;
      cursor:pointer;
      box-shadow:0 0 28px rgba(255,95,0,.55);
    }

    .buy:disabled{
      opacity:.6;
      cursor:wait;
    }

    .extra{
      margin-top:14px;
      font-family:Arial,sans-serif;
      font-size:13px;
      color:#ffe9c0;
      opacity:.88;
    }

    @media(max-width:900px){

      .hero{
        grid-template-columns:1fr;
      }

      .title{
        font-size:46px;
      }

      .slide{
        height:330px;
      }

      .controls{
        grid-template-columns:1fr;
      }

      .qty{
        justify-content:flex-start;
      }

    }

  </style>
</head>

<body>

<main class="wrap">

<section class="hero">

<div>

<span class="badge">
L’ombre de l’élite
</span>

<h1 class="title">
Boutique<br>
AkaTsuki
</h1>

<p class="subtitle">
Produits officiels AkaTsuki Organization.
Paiement sécurisé Stripe.
Fabrication à la demande.
Expédition directe client.
</p>

</div>

<div class="shop" id="shop"></div>

</section>

</main>

<script>
const BACKEND_URL = "https://vente-akatsuki.onrender.com";

const PRODUCTS = [
  {
    key:"casquette",
    name:"Casquette AkaTsuki Organization",
    priceCents:2000,
    priceText:"20,00 €",
    colors:{
      "White":{images:["casquette-white-1.png"],variants:{"Unique":5314638516}},
      "Dark Navy":{images:["casquette-navy-1.png"],variants:{"Unique":5318044313}}
    }
  },
  {
    key:"sweatshirt",
    name:"Pull AkaTsuki Organization",
    priceCents:3490,
    priceText:"34,90 €",
    colors:{
      "Black":{images:["pull-black-1.png"],variants:{S:5314630805,M:5314630806,L:5314630807,XL:5314630808,"2XL":5314630809,"3XL":5314630810,"4XL":5314630811,"5XL":5314630812}},
      "White":{images:["pull-white-1.png"],variants:{S:5318047646,M:5318047647,L:5318047648,XL:5318047649,"2XL":5318047650,"3XL":5318047651,"4XL":5318047652,"5XL":5318047653}}
    }
  },
  {
    key:"tshirt",
    name:"T-Shirt AkaTsuki Organization",
    priceCents:2290,
    priceText:"22,90 €",
    colors:{
      "White":{images:["tshirt-white-1.png"],variants:{S:5313991277,M:5313991278,L:5313991279,XL:5313991280,"2XL":5313991281,"3XL":5313991282}},
      "Black":{images:["tshirt-black-1.png"],variants:{S:5318049010,M:5318049011,L:5318049012,XL:5318049013,"2XL":5318049014,"3XL":5318049015}}
    }
  },
  {
    key:"gourde",
    name:"Gourde Métal AkaTsuki",
    priceCents:3290,
    priceText:"32,90 €",
    colors:{
      "Black":{images:["gourde-black-1.png"],variants:{"17 oz":5313644654}},
      "White":{images:["gourde-white-1.png"],variants:{"17 oz":5318050131}}
    }
  },
  {
    key:"mug",
    name:"Mug AkaTsuki Organization",
    priceCents:1490,
    priceText:"14,90 €",
    colors:{
      "White":{images:["mug-1.png"],variants:{"11 oz":5314630690}}
    }
  },
  {
    key:"coaster",
    name:"Sous-verre AkaTsuki",
    priceCents:890,
    priceText:"8,90 €",
    colors:{
      "Original":{images:["coaster-1.png"],variants:{"Unique":5314630704}}
    }
  },
  {
    key:"magnet",
    name:"Magnet AkaTsuki",
    priceCents:690,
    priceText:"6,90 €",
    colors:{
      "White":{images:["magnet-1.png"],variants:{"Unique":5314630686}}
    }
  }
];

let cart = JSON.parse(localStorage.getItem("aka_cart") || "[]");

const shop = document.querySelector("#shop");

function saveCart(){
  localStorage.setItem("aka_cart", JSON.stringify(cart));
  renderCart();
}

function formatPrice(cents){
  return (cents / 100).toFixed(2).replace(".", ",") + " €";
}

function addToCart(item){
  const existing = cart.find(x => x.syncVariantId === item.syncVariantId);

  if(existing){
    existing.quantity += item.quantity;
  } else {
    cart.push(item);
  }

  saveCart();
}

function removeFromCart(index){
  cart.splice(index, 1);
  saveCart();
}

function renderCart(){
  let cartBox = document.querySelector("#cartBox");

  if(!cartBox){
    cartBox = document.createElement("div");
    cartBox.id = "cartBox";
    cartBox.innerHTML = `
      <button id="cartToggle">🛒 <span id="cartCount">0</span></button>
      <div id="cartPanel">
        <h2>Mon panier</h2>
        <div id="cartItems"></div>
        <div id="cartTotal"></div>
        <button id="checkoutBtn">Commander le panier</button>
      </div>
    `;
    document.body.appendChild(cartBox);

    document.querySelector("#cartToggle").onclick = () => {
      document.querySelector("#cartPanel").classList.toggle("open");
    };

    document.querySelector("#checkoutBtn").onclick = checkoutCart;
  }

  const cartItems = document.querySelector("#cartItems");
  const cartCount = document.querySelector("#cartCount");
  const cartTotal = document.querySelector("#cartTotal");

  cartItems.innerHTML = "";

  let totalQty = 0;
  let totalPrice = 0;

  cart.forEach((item, index) => {
    totalQty += item.quantity;
    totalPrice += item.priceCents * item.quantity;

    const row = document.createElement("div");
    row.className = "cart-item";
    row.innerHTML = `
      <div>
        <strong>${item.name}</strong><br>
        <small>${item.color} / ${item.size} × ${item.quantity}</small>
      </div>
      <div>
        ${formatPrice(item.priceCents * item.quantity)}
        <button onclick="removeFromCart(${index})">×</button>
      </div>
    `;
    cartItems.appendChild(row);
  });

  cartCount.textContent = totalQty;
  cartTotal.innerHTML = `<strong>Total : ${formatPrice(totalPrice)}</strong>`;
}

async function checkoutCart(){
  if(cart.length === 0){
    alert("Ton panier est vide.");
    return;
  }

  const btn = document.querySelector("#checkoutBtn");
  btn.disabled = true;
  btn.textContent = "Ouverture du paiement...";

  try{
    const res = await fetch(`${BACKEND_URL}/create-checkout-session`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({cart})
    });

    const data = await res.json();

    if(!data.url){
      throw new Error(data.error || "Erreur paiement");
    }

    localStorage.removeItem("aka_cart");
    window.top.location.href = data.url;

  } catch(err){
    alert("Erreur : " + err.message);
    btn.disabled = false;
    btn.textContent = "Commander le panier";
  }
}

PRODUCTS.forEach(product => {
  const colorNames = Object.keys(product.colors);
  const defaultColor = colorNames[0];

  const card = document.createElement("article");
  card.className = "product-card";

  card.innerHTML = `
    <div class="product-head">
      <div>
        <h2>${product.name}</h2>
        <p class="small">Produit officiel AkaTsuki Organization.</p>
      </div>
      <span class="tag">${product.priceText}</span>
    </div>

    <div class="gallery">
      <div class="slides">
        <div class="slide">
          <img class="product-img" src="${product.colors[defaultColor].images[0]}" alt="${product.name}">
        </div>
      </div>
    </div>

    <div class="price">${product.priceText}</div>

    <div class="controls">
      <div class="field">
        <label>Couleur</label>
        <select class="color-select">
          ${colorNames.map(c => `<option value="${c}">${c}</option>`).join("")}
        </select>
      </div>

      <div class="field">
        <label>Taille / Format</label>
        <select class="variant-select"></select>
      </div>

      <div class="qty">
        <button class="minus" type="button">−</button>
        <span class="qty-value">1</span>
        <button class="plus" type="button">+</button>
      </div>
    </div>

    <button class="buy" type="button">Ajouter au panier</button>
    <p class="extra">Livraison comprise · Paiement sécurisé Stripe.</p>
  `;

  shop.appendChild(card);

  const colorSelect = card.querySelector(".color-select");
  const variantSelect = card.querySelector(".variant-select");
  const img = card.querySelector(".product-img");
  const qtyValue = card.querySelector(".qty-value");

  let quantity = 1;

  function refreshVariants(){
    const color = colorSelect.value;
    const colorData = product.colors[color];

    img.src = colorData.images[0];

    variantSelect.innerHTML = Object.keys(colorData.variants)
      .map(size => `<option value="${colorData.variants[size]}">${size}</option>`)
      .join("");
  }

  colorSelect.onchange = refreshVariants;
  refreshVariants();

  card.querySelector(".minus").onclick = () => {
    quantity = Math.max(1, quantity - 1);
    qtyValue.textContent = quantity;
  };

  card.querySelector(".plus").onclick = () => {
    quantity = Math.min(10, quantity + 1);
    qtyValue.textContent = quantity;
  };

  card.querySelector(".buy").onclick = () => {
    const color = colorSelect.value;
    const size = variantSelect.options[variantSelect.selectedIndex].text;
    const syncVariantId = Number(variantSelect.value);

    addToCart({
      productKey: product.key,
      name: product.name,
      color,
      size,
      syncVariantId,
      quantity,
      priceCents: product.priceCents
    });

    card.querySelector(".extra").textContent = "✅ Ajouté au panier";
  };
});

renderCart();
</script>

</body>
</html>
</html>
