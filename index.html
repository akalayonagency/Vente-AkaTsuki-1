<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>AkaTsuki Organization — Boutique</title>

  <style>

    :root{
      --gold:#ffd46b;
      --orange:#ff6a00;
      --red:#b40000;
      --dark:#070000;
      --panel:rgba(24,5,5,.82);
      --panel2:rgba(10,0,0,.74);
    }

    *{box-sizing:border-box;}

    html,
    body{
      width:100%;
      min-height:100%;
      margin:0;
      padding:0;
    }

    html{
      overflow-x:hidden;
      scroll-behavior:smooth;
    }

    body{
      font-family:Georgia,'Times New Roman',serif;
      color:#fff;
      background:
        radial-gradient(circle at 50% -10%,rgba(255,106,0,.55) 0,rgba(69,17,0,.92) 18%,#120303 48%,#020000 100%);
      overflow-x:hidden;
      overflow-y:auto;
      padding-bottom:110px;
    }

    body:before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 18% 16%,rgba(255,212,107,.14),transparent 28%),
        radial-gradient(circle at 82% 20%,rgba(180,0,0,.24),transparent 32%),
        linear-gradient(120deg,transparent,rgba(255,0,0,.12),transparent);
      pointer-events:none;
      z-index:0;
    }

    body:after{
      content:"";
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(255,212,107,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,212,107,.025) 1px, transparent 1px);
      background-size:44px 44px;
      mask-image:linear-gradient(to bottom,rgba(0,0,0,.8),rgba(0,0,0,.25));
      pointer-events:none;
      z-index:0;
    }

    .wrap{
      position:relative;
      z-index:1;
      width:100%;
      max-width:1540px;
      margin:0 auto;
      padding:18px clamp(12px,2.2vw,34px) 130px;
    }

    .hero{width:100%;}

    .intro{
      text-align:center;
      max-width:900px;
      margin:0 auto 34px;
      padding-top:4px;
    }

    .badge{
      display:inline-block;
      border:1px solid rgba(255,212,107,.55);
      padding:8px 15px;
      border-radius:999px;
      color:var(--gold);
      background:rgba(0,0,0,.42);
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:13px;
      box-shadow:0 0 20px rgba(255,106,0,.18);
    }

    .title{
      font-size:clamp(42px,7vw,96px);
      line-height:.9;
      margin:18px 0 14px;
      text-transform:uppercase;
      text-shadow:0 0 18px rgba(255,95,0,.9), 0 0 44px rgba(180,0,0,.55);
    }

    .subtitle{
      font-family:Arial,sans-serif;
      font-size:clamp(15px,1.5vw,19px);
      line-height:1.55;
      color:#ffe9c0;
      max-width:760px;
      margin:0 auto;
    }

    .shop{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:clamp(18px,2vw,30px);
      width:100%;
      margin:0 auto;
      align-items:start;
    }

    .product-card{
      min-width:0;
      border:1px solid rgba(255,212,107,.42);
      background:linear-gradient(180deg,rgba(31,5,5,.88),rgba(12,0,0,.88));
      border-radius:28px;
      padding:clamp(16px,1.8vw,24px);
      box-shadow:0 0 34px rgba(255,70,0,.24), inset 0 0 30px rgba(255,125,0,.08);
      backdrop-filter:blur(10px);
      overflow:hidden;
    }

    .product-head{
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:flex-start;
      margin-bottom:16px;
    }

    .product-head h2{
      font-size:clamp(22px,2vw,30px);
      line-height:1.05;
      margin:0 0 8px;
    }

    .tag{
      font-family:Arial,sans-serif;
      color:#120000;
      background:linear-gradient(135deg,#ffe39a,#ff7400);
      font-weight:900;
      padding:8px 12px;
      border-radius:999px;
      white-space:nowrap;
      font-size:11px;
      text-transform:uppercase;
      box-shadow:0 0 18px rgba(255,120,0,.45);
    }

    .gallery{
      position:relative;
      overflow:hidden;
      border-radius:24px;
      background:radial-gradient(circle at center,rgba(255,106,0,.12),rgba(0,0,0,.44));
      border:1px solid rgba(255,212,107,.22);
      user-select:none;
    }

    .slides{
      display:flex;
      transition:transform .35s ease;
      touch-action:pan-y;
      will-change:transform;
    }

    .slide{
      flex:0 0 100%;
      min-width:100%;
      height:clamp(250px,23vw,370px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:clamp(14px,1.7vw,22px);
    }

    .slide img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 0 24px rgba(255,95,0,.58));
      pointer-events:none;
    }

    .nav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:42px;
      height:42px;
      border-radius:50%;
      border:1px solid rgba(255,212,107,.75);
      background:rgba(10,0,0,.78);
      color:var(--gold);
      font-size:26px;
      cursor:pointer;
      z-index:2;
      backdrop-filter:blur(8px);
    }

    .prev{left:10px;}
    .next{right:10px;}

    .dots{
      display:flex;
      gap:8px;
      justify-content:center;
      margin:14px 0;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      border:1px solid var(--gold);
      background:transparent;
      cursor:pointer;
      padding:0;
    }

    .dot.active{
      background:var(--gold);
      box-shadow:0 0 12px rgba(255,212,107,.8);
    }

    .small{
      font-family:Arial,sans-serif;
      color:#ffd9a3;
      line-height:1.5;
      margin:0;
    }

    .price{
      font-size:clamp(32px,3vw,44px);
      color:var(--gold);
      font-weight:bold;
      margin:12px 0;
    }

    .controls{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(0,1fr) auto;
      gap:12px;
      align-items:end;
      margin:20px 0;
    }

    .field label{
      display:block;
      font-family:Arial,sans-serif;
      font-size:13px;
      color:#ffd9a3;
      margin-bottom:8px;
    }

    select{
      width:100%;
      min-width:0;
      padding:13px;
      border-radius:14px;
      border:1px solid rgba(255,212,107,.5);
      background:#160202;
      color:#fff;
      font-weight:bold;
    }

    .qty{
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:flex-end;
    }

    .qty button{
      width:42px;
      height:42px;
      border-radius:50%;
      border:1px solid var(--gold);
      background:#180202;
      color:var(--gold);
      font-size:22px;
      cursor:pointer;
    }

    .qty span{
      font-size:22px;
      min-width:25px;
      text-align:center;
    }

    .buy{
      width:100%;
      border:0;
      border-radius:18px;
      padding:18px 20px;
      background:linear-gradient(135deg,#ffe39a,#ff7400,#a80000);
      color:#120000;
      font-weight:900;
      text-transform:uppercase;
      font-size:17px;
      letter-spacing:.08em;
      cursor:pointer;
      box-shadow:0 0 28px rgba(255,95,0,.48);
    }

    .buy:disabled{opacity:.6; cursor:wait;}

    .extra{
      margin:14px 0 0;
      font-family:Arial,sans-serif;
      font-size:13px;
      color:#ffe9c0;
      opacity:.88;
    }

    #cartToggle{
      position:fixed;
      right:22px;
      bottom:22px;
      z-index:99999;
      border:none;
      border-radius:999px;
      padding:16px 22px;
      min-width:142px;
      min-height:58px;
      background:linear-gradient(135deg,rgba(255,227,154,.96),rgba(255,116,0,.96),rgba(168,0,0,.96));
      color:#120000;
      font-family:Arial,sans-serif;
      font-weight:950;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 14px 42px rgba(0,0,0,.45),0 0 30px rgba(255,95,0,.75), inset 0 1px 0 rgba(255,255,255,.38);
      animation:cartFloat 3s ease-in-out infinite;
    }

    #cartToggle:before{
      content:"";
      position:absolute;
      inset:-7px;
      border-radius:999px;
      border:1px solid rgba(255,212,107,.35);
      pointer-events:none;
      box-shadow:0 0 28px rgba(255,106,0,.28);
    }

    #cartToggle:hover{transform:translateY(-3px) scale(1.03);}

    @keyframes cartFloat{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-5px);}
    }

    #cartPanel{
      position:fixed;
      right:22px;
      bottom:94px;
      z-index:99998;
      width:min(92vw,420px);
      max-height:min(72vh,620px);
      overflow:auto;
      background:linear-gradient(180deg,rgba(24,0,0,.97),rgba(5,0,0,.98));
      border:1px solid rgba(255,212,107,.45);
      border-radius:24px;
      padding:20px;
      box-shadow:0 18px 55px rgba(0,0,0,.55),0 0 40px rgba(255,70,0,.45);
      backdrop-filter:blur(14px);
      display:none;
    }

    #cartPanel.open{display:block;}

    #cartPanel h2{margin-top:0; color:var(--gold);}

    .cart-item{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:12px 0;
      border-bottom:1px solid rgba(255,212,107,.2);
      font-family:Arial,sans-serif;
    }

    .cart-item small{color:#ffd9a3;}

    .cart-item button{
      margin-left:8px;
      border:none;
      background:#ff4b00;
      color:white;
      border-radius:8px;
      cursor:pointer;
    }

    #cartTotal{margin:18px 0; font-size:20px; color:var(--gold);}

    #checkoutBtn{
      width:100%;
      border:0;
      border-radius:18px;
      padding:16px;
      background:linear-gradient(135deg,#ffe39a,#ff7400,#a80000);
      color:#120000;
      font-weight:900;
      text-transform:uppercase;
      cursor:pointer;
    }

    @media(max-width:1180px){
      .shop{grid-template-columns:repeat(2,minmax(0,1fr));}
    }

    @media(max-width:760px){
      body{padding-bottom:104px;}
      .wrap{padding:12px 12px 120px;}
      .intro{margin-bottom:24px;}
      .title{font-size:clamp(38px,14vw,58px);}
      .subtitle{font-size:15px;}
      .shop{grid-template-columns:1fr; gap:20px;}
      .product-card{padding:16px; border-radius:24px;}
      .product-head{flex-direction:column; gap:10px;}
      .slide{height:315px;}
      .controls{grid-template-columns:1fr;}
      .qty{justify-content:flex-start;}
      .nav{width:40px; height:40px;}

      #cartToggle{
        left:12px;
        right:12px;
        bottom:12px;
        width:auto;
        min-height:62px;
        border-radius:20px;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:8px;
      }

      #cartPanel{
        left:10px;
        right:10px;
        width:auto;
        bottom:86px;
        max-height:68vh;
      }
    }

    @media(max-width:390px){
      .slide{height:280px;}
      .product-head h2{font-size:22px;}
      .price{font-size:32px;}
    }

  </style>
</head>

let cart = JSON.parse(localStorage.getItem("aka_cart") || "[]");

const shop = document.querySelector("#shop");

function saveCart(){
  localStorage.setItem("aka_cart", JSON.stringify(cart));
  renderCart();
}

function formatPrice(cents){
  return (cents / 100).toFixed(2).replace(".", ",") + " €";
}

function addToCart(item){
  const existing = cart.find(x => x.syncVariantId === item.syncVariantId);

  if(existing){
    existing.quantity += item.quantity;
  } else {
    cart.push(item);
  }

  saveCart();
}

function removeFromCart(index){
  cart.splice(index, 1);
  saveCart();
}

function renderCart(){
  let cartBox = document.querySelector("#cartBox");

  if(!cartBox){
    cartBox = document.createElement("div");
    cartBox.id = "cartBox";
    cartBox.innerHTML = `
      <button id="cartToggle">🛒 <span id="cartCount">0</span></button>
      <div id="cartPanel">
        <h2>Mon panier</h2>
        <div id="cartItems"></div>
        <div id="cartTotal"></div>
        <button id="checkoutBtn">Commander le panier</button>
      </div>
    `;

    document.body.appendChild(cartBox);

    document.querySelector("#cartToggle").onclick = () => {
      document.querySelector("#cartPanel").classList.toggle("open");
    };

    document.querySelector("#checkoutBtn").onclick = checkoutCart;
  }

  const cartItems = document.querySelector("#cartItems");
  const cartCount = document.querySelector("#cartCount");
  const cartTotal = document.querySelector("#cartTotal");

  cartItems.innerHTML = "";

  let totalQty = 0;
  let totalPrice = 0;

  cart.forEach((item, index) => {
    totalQty += item.quantity;
    totalPrice += item.priceCents * item.quantity;

    const row = document.createElement("div");
    row.className = "cart-item";
    row.innerHTML = `
      <div>
        <strong>${item.name}</strong><br>
        <small>${item.color} / ${item.size} × ${item.quantity}</small>
      </div>
      <div>
        ${formatPrice(item.priceCents * item.quantity)}
        <button onclick="removeFromCart(${index})">×</button>
      </div>
    `;

    cartItems.appendChild(row);
  });

  cartCount.textContent = totalQty;
  cartTotal.innerHTML = `<strong>Total : ${formatPrice(totalPrice)}</strong>`;
}

async function checkoutCart(){
  if(cart.length === 0){
    alert("Ton panier est vide.");
    return;
  }

  const btn = document.querySelector("#checkoutBtn");
  btn.disabled = true;
  btn.textContent = "Ouverture du paiement...";

  try{
    const res = await fetch(`${BACKEND_URL}/create-checkout-session`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        cart: cart.map(item => ({
          productKey: item.productKey,
          syncVariantId: item.syncVariantId,
          quantity: item.quantity
        }))
      })
    });

    const data = await res.json();

    if(!data.url){
      throw new Error(data.error || "Erreur paiement");
    }

    localStorage.removeItem("aka_cart");
    window.top.location.href = data.url;

  } catch(err){
    alert("Erreur : " + err.message);
    btn.disabled = false;
    btn.textContent = "Commander le panier";
  }
}

        <button class="plus" type="button">+</button>
      </div>
    </div>

    <button class="buy" type="button">Ajouter au panier</button>
    <p class="extra">Livraison comprise · Paiement sécurisé Stripe.</p>
  `;

  shop.appendChild(card);

  const colorSelect = card.querySelector(".color-select");
  const variantSelect = card.querySelector(".variant-select");
  const slides = card.querySelector(".slides");
  const dots = card.querySelector(".dots");
  const qtyValue = card.querySelector(".qty-value");

  let quantity = 1;
  let currentSlide = 0;

  function updateGallery(){
    slides.style.transform = `translateX(-${currentSlide * 100}%)`;

    dots.querySelectorAll(".dot").forEach((dot, index) => {
      dot.classList.toggle("active", index === currentSlide);
    });
  }

  function renderGallery(){
    const color = colorSelect.value;
    const colorData = product.colors[color];

    currentSlide = 0;

    slides.innerHTML = colorData.images.map(image => `
      <div class="slide">
        <img src="${image}" alt="${product.name}">
      </div>
    `).join("");

    dots.innerHTML = colorData.images.map((_, index) => `
      <button class="dot ${index === 0 ? "active" : ""}" type="button"></button>
    `).join("");

    updateGallery();
    sendIframeHeight();
  }

  function refreshVariants(){
    const color = colorSelect.value;
    const colorData = product.colors[color];

    variantSelect.innerHTML = Object.keys(colorData.variants)
      .map(size => `<option value="${colorData.variants[size]}">${size}</option>`)
      .join("");

    renderGallery();
  }

  colorSelect.onchange = refreshVariants;
  refreshVariants();

  card.querySelector(".prev").onclick = () => {
    const colorData = product.colors[colorSelect.value];
    currentSlide = (currentSlide - 1 + colorData.images.length) % colorData.images.length;
    updateGallery();
  };

  card.querySelector(".next").onclick = () => {
    const colorData = product.colors[colorSelect.value];
    currentSlide = (currentSlide + 1) % colorData.images.length;
    updateGallery();
  };

  dots.onclick = (e) => {
    if(!e.target.classList.contains("dot")) return;
    currentSlide = [...dots.children].indexOf(e.target);
    updateGallery();
  };

  let touchStartX = 0;
  let touchEndX = 0;

  slides.addEventListener("touchstart", (e) => {
    touchStartX = e.changedTouches[0].screenX;
  }, {passive:true});

  slides.addEventListener("touchend", (e) => {
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchStartX - touchEndX;
    if(Math.abs(diff) < 45) return;

    const colorData = product.colors[colorSelect.value];
    if(diff > 0){
      currentSlide = (currentSlide + 1) % colorData.images.length;
    } else {
      currentSlide = (currentSlide - 1 + colorData.images.length) % colorData.images.length;
    }
    updateGallery();
  }, {passive:true});

  card.querySelector(".minus").onclick = () => {
    quantity = Math.max(1, quantity - 1);
    qtyValue.textContent = quantity;
  };

  card.querySelector(".plus").onclick = () => {
    quantity = Math.min(10, quantity + 1);
    qtyValue.textContent = quantity;
  };

  card.querySelector(".buy").onclick = () => {
    const color = colorSelect.value;
    const size = variantSelect.options[variantSelect.selectedIndex].text;
    const syncVariantId = Number(variantSelect.value);

    addToCart({
      productKey: product.key,
      name: product.name,
      color,
      size,
      syncVariantId,
      quantity,
      priceCents: product.priceCents
    });

    card.querySelector(".extra").textContent = "✅ Ajouté au panier";
  };
});

function sendIframeHeight(){
  const height = Math.max(
    document.body.scrollHeight,
    document.documentElement.scrollHeight,
    document.body.offsetHeight,
    document.documentElement.offsetHeight
  );

  window.parent.postMessage({
    type:"AKATSUKI_IFRAME_HEIGHT",
    height
  }, "*");
}

window.addEventListener("load", sendIframeHeight);
window.addEventListener("resize", sendIframeHeight);

new ResizeObserver(sendIframeHeight).observe(document.body);

renderCart();
sendIframeHeight();
</script>

</body>
</html>
